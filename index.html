<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Feliz 7 Meses, Meu Amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --wine-dark:#26030f;
    --wine:#4a0f24;
    --wine-light:#742040;
    --gold:#d9a656;
    --gold-light:#f3d9a4;
    --cream:#f7ecd9;
    --blush:#eeb6c4;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
    font-family:'Jost', sans-serif;
    color:var(--cream);
  }

  body{
    background:linear-gradient(135deg, var(--wine-dark), var(--wine) 45%, var(--wine-light) 100%);
    background-size:220% 220%;
    animation:bgShift 16s ease-in-out infinite;
    position:relative;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 50% 35%, rgba(0,0,0,0) 0%, rgba(0,0,0,.55) 100%);
    pointer-events:none;
    z-index:5;
  }

  @keyframes bgShift{
    0%,100%{ background-position:0% 0%; }
    50%{ background-position:100% 100%; }
  }

  #sparkles{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
  }

  .spark{
    position:absolute;
    background:var(--gold-light);
    border-radius:50%;
    opacity:0;
    animation-name:twinkle;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }

  @keyframes twinkle{
    0%,100%{ opacity:0; transform:scale(.4); }
    50%{ opacity:.9; transform:scale(1); }
  }

  #rain-container{
    position:fixed;
    inset:0;
    z-index:3;
    pointer-events:none;
    overflow:hidden;
  }

  .rain-heart{
    position:absolute;
    top:-8%;
    will-change:transform, opacity;
    animation-name:heartFall;
    animation-timing-function:linear;
    animation-fill-mode:forwards;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));
  }

  @keyframes heartFall{
    0%{ transform:translate(0,0) rotate(0deg); opacity:0; }
    10%{ opacity:.8; }
    90%{ opacity:.65; }
    100%{ transform:translate(var(--drift), 118vh) rotate(var(--rot)); opacity:0; }
  }

  .stage{
    position:relative;
    z-index:10;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:3.5rem 1.25rem 4rem;
    gap:.35rem;
  }

  .eyebrow{
    font-family:'Jost', sans-serif;
    font-weight:400;
    letter-spacing:.42em;
    text-transform:uppercase;
    font-size:clamp(.62rem, 2vw, .8rem);
    color:var(--gold);
    margin:0 0 .6rem;
    opacity:0;
    animation:fadeInUp .9s ease forwards;
    animation-delay:.15s;
  }

  .hero{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(1.85rem, 6.2vw, 3.6rem);
    line-height:1.3;
    margin:0;
    max-width:20ch;
    color:var(--cream);
    text-shadow:0 2px 30px rgba(0,0,0,.35);
    visibility:hidden;
  }

  .hero.ready{ visibility:visible; }

  .hero .letter{
    display:inline-block;
    opacity:0;
    transform:translateY(16px) rotate(2deg);
    animation:letterIn .55s cubic-bezier(.2,.8,.3,1.2) forwards;
    animation-delay:calc(var(--i) * .04s + .25s);
  }

  @keyframes letterIn{
    to{ opacity:1; transform:translateY(0) rotate(0deg); }
  }

  .hero .num{
    font-style:normal;
    font-weight:700;
    font-size:1.35em;
    color:var(--gold-light);
    text-shadow:0 0 22px rgba(217,166,86,.7);
    padding:0 .06em;
  }

  .subtitle{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(.95rem, 2.4vw, 1.15rem);
    color:var(--blush);
    margin:.9rem 0 0;
    opacity:0;
    animation:fadeInUp 1s ease forwards;
    animation-delay:1.6s;
  }

  @keyframes fadeInUp{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .locket-wrap{
    margin:2.6rem auto 1rem;
    opacity:0;
    animation:fadeInUp .6s ease forwards;
    animation-delay:1.8s;
  }

  .locket{
    position:relative;
    width:clamp(180px, 58vw, 340px);
    animation:floaty 5s ease-in-out infinite;
    animation-delay:3.1s;
  }

  @keyframes floaty{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
  }

  .locket img{
    display:block;
    width:100%;
    height:auto;
    filter:drop-shadow(0 18px 34px rgba(0,0,0,.5));
    opacity:0;
    animation:settleIn 1.3s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay:1.85s;
  }

  @keyframes settleIn{
    0%{ opacity:0; transform:translateY(-150px) rotate(-16deg) scale(.5); }
    55%{ opacity:1; transform:translateY(16px) rotate(4deg) scale(1.05); }
    78%{ transform:translateY(-6px) rotate(-1.5deg) scale(.99); }
    100%{ opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
  }

  .caption{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:clamp(.82rem, 2vw, .95rem);
    color:var(--gold-light);
    opacity:0;
    animation:fadeInUp .9s ease forwards;
    animation-delay:2.9s;
  }

  .kiss-btn{
    margin-top:2.3rem;
    padding:.85rem 1.9rem;
    min-height:44px;
    font-family:'Jost', sans-serif;
    font-size:.8rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold-light);
    background:transparent;
    border:1px solid var(--gold);
    border-radius:999px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    touch-action:manipulation;
    transition:background .35s ease, color .35s ease, box-shadow .35s ease, transform .2s ease;
    opacity:0;
    animation:fadeInUp .9s ease forwards;
    animation-delay:3.2s;
  }

  .kiss-btn:hover{
    background:var(--gold);
    color:var(--wine-dark);
    box-shadow:0 0 26px rgba(217,166,86,.55);
  }

  .kiss-btn:active{ transform:scale(.96); }

  .kiss-btn:focus-visible{
    outline:2px solid var(--gold-light);
    outline-offset:4px;
  }

  .hidden-note{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:clamp(.95rem, 2.2vw, 1.1rem);
    color:var(--cream);
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition:max-height .6s ease, opacity .6s ease, margin .6s ease;
    margin-top:0;
  }

  .hidden-note.visible{
    max-height:100px;
    opacity:1;
    margin-top:1.3rem;
  }

  #burst-container{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:40;
  }

  .burst-heart{
    position:fixed;
    pointer-events:none;
    color:var(--blush);
    animation:heartBurst ease-out forwards;
    z-index:40;
  }

  @keyframes heartBurst{
    0%{ transform:translate(0,0) scale(.6) rotate(0deg); opacity:1; }
    100%{ transform:translate(var(--dx), -260px) scale(1.1) rotate(var(--rot)); opacity:0; }
  }

  @media (max-width:420px){
    .stage{ padding:2.6rem 1rem 3rem; }
    .kiss-btn{ padding:.85rem 1.5rem; letter-spacing:.2em; }
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
    }
    .hero{ visibility:visible; }
    .hero .letter{ opacity:1; transform:none; }
  }
</style>
</head>
<body>

  <div id="sparkles"></div>
  <div id="rain-container"></div>

  <main class="stage">
    <p class="eyebrow">mêsversário de namoro</p>

    <h1 class="hero" id="hero">Feliz <span class="num">7</span> meses juntos,<br>meu amor!</h1>

    <p class="subtitle">O que começou com um chaveiro...</p>

    <div class="locket-wrap">
      <div class="locket">
        <img src="https://i.ibb.co/HwxDpfH/Chat-GPT-Image-15-de-jul-de-2026-02-51-22.png" alt="Chat GPT Image 15 de jul de 2026 02 51 22" border="0">
      </div>
    </div>

    <p class="caption">Terminou em uma linda história de amor! ✦</p>

    <button id="kiss-btn" class="kiss-btn">✦ toque aqui ✦</button>
    <p id="hidden-note" class="hidden-note">Feliz nosso dia meu amor, eu te amo.🤍</p>
  </main>

  <div id="burst-container"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // ---- título letra por letra ----
      function animateLetters(root){
        let i = 0;
        function walk(node){
          if (node.nodeType === Node.TEXT_NODE){
            const frag = document.createDocumentFragment();
            [...node.textContent].forEach(ch => {
              if (ch === ' '){
                frag.appendChild(document.createTextNode(' '));
              } else {
                const span = document.createElement('span');
                span.className = 'letter';
                span.style.setProperty('--i', i++);
                span.textContent = ch;
                frag.appendChild(span);
              }
            });
            node.replaceWith(frag);
          } else if (node.nodeType === Node.ELEMENT_NODE){
            Array.from(node.childNodes).forEach(walk);
          }
        }
        Array.from(root.childNodes).forEach(walk);
        root.classList.add('ready');
      }
      animateLetters(document.getElementById('hero'));

      // ---- brilhos ambientes ----
      const sparkleContainer = document.getElementById('sparkles');
      const totalSparks = window.innerWidth < 600 ? 12 : 20;
      for (let i = 0; i < totalSparks; i++) {
        const s = document.createElement('div');
        s.className = 'spark';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        const size = (Math.random() * 2.4 + 1).toFixed(2);
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.animationDuration = (Math.random() * 3 + 2.5).toFixed(2) + 's';
        s.style.animationDelay = (Math.random() * 5).toFixed(2) + 's';
        sparkleContainer.appendChild(s);
      }

      // ---- chuva de corações, lenta e discreta ----
      const rainContainer = document.getElementById('rain-container');
      function spawnRainHeart(){
        const heart = document.createElement('span');
        heart.className = 'rain-heart';
        heart.textContent = Math.random() > 0.5 ? '❤' : '♡';
        const left = Math.random() * 100;
        const size = (Math.random() * 10 + 12).toFixed(1);
        const duration = (Math.random() * 6 + 11).toFixed(1);
        const drift = ((Math.random() - 0.5) * 90).toFixed(0) + 'px';
        const rot = ((Math.random() - 0.5) * 50).toFixed(0) + 'deg';
        heart.style.left = left + '%';
        heart.style.fontSize = size + 'px';
        heart.style.color = Math.random() > 0.5 ? 'var(--blush)' : 'var(--gold-light)';
        heart.style.setProperty('--drift', drift);
        heart.style.setProperty('--rot', rot);
        heart.style.animationDuration = duration + 's';
        rainContainer.appendChild(heart);
        heart.addEventListener('animationend', () => heart.remove());
      }
      for (let i = 0; i < 3; i++){ setTimeout(spawnRainHeart, i * 1400); }
      setInterval(spawnRainHeart, 2800);

      // ---- toque no botão: chuvinha de corações + mensagem ----
      const btn = document.getElementById('kiss-btn');
      const note = document.getElementById('hidden-note');
      const burstContainer = document.getElementById('burst-container');

      btn.addEventListener('click', () => {
        note.classList.add('visible');

        const rect = btn.getBoundingClientRect();
        const originX = rect.left + rect.width / 2;
        const originY = rect.top;
        const count = 16;

        for (let i = 0; i < count; i++) {
          const heart = document.createElement('span');
          heart.className = 'burst-heart';
          heart.textContent = Math.random() > 0.5 ? '❤' : '♡';
          const dx = (Math.random() - 0.5) * 240;
          const rot = (Math.random() - 0.5) * 90;
          heart.style.setProperty('--dx', dx + 'px');
          heart.style.setProperty('--rot', rot + 'deg');
          heart.style.left = originX + 'px';
          heart.style.top = originY + 'px';
          heart.style.fontSize = (Math.random() * 14 + 14) + 'px';
          heart.style.animationDuration = (Math.random() * 0.7 + 1.3) + 's';
          burstContainer.appendChild(heart);
          heart.addEventListener('animationend', () => heart.remove());
        }
      });
    });
  </script>

</body>
</html>
